<div class="main-container">
  <img src="assets/bg.png" class="bg-shape" alt="background">

  <section class="content">
    <div class="glass-card welcome-card">
      <div class="card-header">
        <img src="assets/i_lunch.png" alt="Lunch box" class="main-icon">
        <h1>Fresh groceries <br> <span>delivered to your door</span></h1>
      </div>
      <button class="btn-start">Get Started</button>
    </div>

    <div class="glass-card products-card">
      <h3>Popular Categories</h3>
      <div class="categories-grid">
        <div class="category-item">
          <div class="icon-wrapper">
            <img src="assets/i_apple.png" alt="Fruits">
          </div>
          <span>Fruits</span>
        </div>
        <div class="category-item">
          <div class="icon-wrapper">
            <img src="assets/i_kibble.png" alt="Pets">
          </div>
          <span>Pets</span>
        </div>
      </div>
    </div>
  </section>
</div>
